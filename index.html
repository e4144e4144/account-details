<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Recovery Portal</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #1c1e21; line-height: 1.5; }
        .card { max-width: 450px; margin: 20px auto; background: #ffffff; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-top: 6px solid #d93025; }
        header { text-align: center; margin-bottom: 25px; }
        h1 { font-size: 1.4rem; color: #d93025; margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1px; }
        .warning-text { font-size: 0.95rem; font-weight: 600; background: #fff1f0; color: #d93025; padding: 12px; border-radius: 8px; border: 1px solid #ffccc7; }
        .qr-container { text-align: center; margin: 25px 0; }
        .qr-container img { width: 100%; max-width: 240px; border: 2px solid #f0f0f0; border-radius: 12px; padding: 5px; }
        .info-section { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-top: 20px; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .data-row:last-child { border-bottom: none; }
        .label { font-size: 0.8rem; color: #65676b; font-weight: bold; }
        .value { font-family: 'Courier New', monospace; font-size: 1rem; color: #050505; }
        footer { text-align: center; font-size: 0.75rem; color: #8a8d91; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="card">
        <header>
            <h1>Emergency Contact</h1>
            <div class="warning-text">
                Contact here ONLY for account recovery or if the main account holder is offline and the shelter is in a CRITICAL/DANGEROUS state.
            </div>
        </header>

        <div class="qr-container">
            <img src="line_qr.png" alt="Emergency QR Code">
            <p style="font-size: 0.85rem; color: #4b4f56; margin-top: 10px;">Scan to connect via Messenger/LINE</p>
        </div>

        <div class="info-section">
            <div class="data-row">
                <span class="label">IDENTIFIER:</span>
                <span class="value">Admin_Secure_01</span>
            </div>
            <div class="data-row">
                <span class="label">PASSCODE:</span>
                <span class="value">********</span>
            </div>
        </div>

        <footer>&copy; 2026 Emergency Support Network</footer>
    </div>
</body>
</html>
